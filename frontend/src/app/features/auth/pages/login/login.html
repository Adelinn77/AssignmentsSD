<div class="login-wrapper">
  <div class="login-card">
    <h1 class="login-title">Login</h1>

    <div class="form-group">
      <label for="email">Username</label>
      <input id="email" type="text" placeholder="Enter your username"
             [ngModel]="username()" (ngModelChange)="username.set($event)" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter your password"
             [ngModel]="password()" (ngModelChange)="password.set($event)" />
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" id="btn-login" (click)="login()">Login</button>
      <button class="btn btn-secondary" id="btn-create">Create Account</button>
    </div>
  </div>
</div>
